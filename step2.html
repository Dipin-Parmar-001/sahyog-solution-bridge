<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">

<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-sm">
    <div class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto">
        <div class="text-2xl font-bold tracking-tight text-primary font-headline">Sahyog Solution Bridge</div>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center gap-8 mr-4">
                <a class="text-sm font-label text-on-surface-variant hover:text-primary transition-colors" href="index.html">Home</a>
                <a class="text-sm font-label text-on-surface-variant hover:text-primary transition-colors" href="index.html#vision">How it Works</a>
            </div>
            <span class="text-sm font-label text-on-surface-variant bg-surface-container px-4 py-2 rounded-full">Step 2 of 3</span>
        </div>
    </div>
</nav>

<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-6">
    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
        <div class="md:col-span-4 space-y-6 md:sticky md:top-32">
            <div class="bg-surface-container-low p-8 rounded-lg">
                <div class="w-12 h-12 rounded-full signature-gradient flex items-center justify-center text-on-primary mb-6 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined">bolt</span>
                </div>
                <h3 class="font-headline text-xl font-bold mb-3">Why this matters?</h3>
                <p class="text-on-surface-variant text-sm leading-relaxed">Innovation begins where frustration lives.</p>
            </div>
        </div>

        <div class="md:col-span-8">
            <section class="bg-surface-container-lowest p-8 md:p-12 rounded-xl shadow-sm border border-outline-variant/5">
                <header class="mb-10">
                    <h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface mb-6">
                        Aapka din <span class="text-gradient">kahan atak jaata hai?</span>
                    </h1>
                </header>
                <form class="space-y-8">
                    <div class="relative group">
                        <label class="sr-only" for="friction-point">Describe your friction point</label>
                        <textarea class="w-full bg-surface-container-low border-0 rounded-lg p-6 text-on-surface text-lg placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 resize-none outline-none" id="friction-point" placeholder="Example: Har Monday, mujhe 3 ghante lagte hain..." rows="8"></textarea>
                    </div>

                    <div class="flex flex-col sm:flex-row items-center justify-between gap-6 pt-4">
                        <a href="step1.html" class="text-on-surface-variant hover:text-primary font-semibold text-sm transition-colors flex items-center gap-2 px-6 py-3 rounded-full hover:bg-surface-container-high">
                            <span class="material-symbols-outlined">arrow_back</span> Go Back
                        </a>
                        <button type="button" id="step2Continue" class="signature-gradient text-on-primary font-bold text-lg px-10 py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center gap-3">
                            Analyze Problem
                            <span class="material-symbols-outlined">trending_flat</span>
                        </button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<script>
    const safeLocalStorage = {
      get(key) {
        try {
          return window.localStorage.getItem(key);
        } catch (error) {
          console.warn('localStorage get failed:', key, error);
          return null;
        }
      },
      set(key, value) {
        try {
          window.localStorage.setItem(key, value);
          return true;
        } catch (error) {
          console.warn('localStorage set failed:', key, error);
          return false;
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
        const frictionInput = document.getElementById('friction-point');
        const contBtn = document.getElementById('step2Continue');

        if (!frictionInput || !contBtn) {
          return;
        }

        const savedFriction = safeLocalStorage.get('lucid_friction');
        if (savedFriction) {
            frictionInput.value = savedFriction;
        }

        contBtn.addEventListener('click', function() {
            const friction = frictionInput.value.trim();
            
            if (!friction) {
                alert('Please describe your friction point to continue.');
                return;
            }

            safeLocalStorage.set('lucid_friction', friction);
            window.location.href = 'step3.html';
        });

        frictionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                contBtn.click();
            }
        });
    });
    console.log(safeLocalStorage);
</script>

</body>
</html>
